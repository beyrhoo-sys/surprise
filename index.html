<!DOCTYPE html>

<html>
<head>
  <title>Galaxy Test</title>
  <style>
    body {
      margin:0;
      background:black;
      overflow:hidden;
    }
    canvas {
      display:block;
    }
  </style>
</head>

<body>

<canvas class="webgl"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.querySelector('.webgl');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(innerWidth, innerHeight);

// 🌌 REAL GALAXY
const count = 4000;
const positions = new Float32Array(count * 3);

const branches = 4;
const spin = 1.2;

for(let i=0;i<count;i++){
  let i3 = i * 3;

  let radius = Math.random() * 6;
  let branchAngle = (i % branches) / branches * Math.PI * 2;

  let angle = branchAngle + radius * spin;

  // position spiral
  positions[i3] = Math.cos(angle) * radius;
  positions[i3+1] = (Math.random() - 0.5) * 0.5;
  positions[i3+2] = Math.sin(angle) * radius;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  size: 0.05,
  color: '#ff69b4'
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

// 🎬 ANIMATION
function tick(){
  galaxy.rotation.y += 0.0015;
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// 📱 resize support
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
