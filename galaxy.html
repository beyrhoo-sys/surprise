<!DOCTYPE html>
<html>
<head>
  <title>Galaxy REAL 3D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>
<canvas id="galaxy"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.getElementById('galaxy');
const scene = new THREE.Scene();

// CAMERA (start jauh)
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 2, 30);
scene.add(camera);

// RENDER
const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// ⭐ TEXTURE BULAT (INI YANG BAGI NAMPak CANTIK)
const textureLoader = new THREE.TextureLoader();
const starTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/disc.png');

// GALAXY PARAM
const count = 20000;
const positions = new Float32Array(count * 3);

for(let i = 0; i < count; i++){
  const i3 = i * 3;

  const radius = Math.random() * 10;
  const angle = radius * 1.5;

  positions[i3]     = Math.cos(angle) * radius;
  positions[i3 + 1] = (Math.random() - 0.5) * 2;
  positions[i3 + 2] = Math.sin(angle) * radius;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

// ⭐ MATERIAL GLOW (INI YANG BUANG PIXEL LOOK)
const material = new THREE.PointsMaterial({
  size: 0.1,
  map: starTexture,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  color: '#ff69b4'
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

// 🚀 ANIMATION
let speed = 0;

function animate(){
  requestAnimationFrame(animate);

  // rotate
  galaxy.rotation.y += 0.002;

  // 👉 ZOOM MASUK BETUL
  if(camera.position.z > 5){
    camera.position.z -= 0.1;   // bergerak ke depan
    camera.position.y -= 0.01;  // turun sikit (rasa masuk)
  }

  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
