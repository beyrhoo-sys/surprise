<!DOCTYPE html>
<html>
<head>
  <title>Real Galaxy</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>
<canvas id="galaxy"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.getElementById('galaxy');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// ⭐ texture (buat bulat smooth)
const loader = new THREE.TextureLoader();
const texture = loader.load('https://threejs.org/examples/textures/sprites/disc.png');

// PARAM
const count = 40000;
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);

const colorInside = new THREE.Color('#ff6030'); // tengah (orange)
const colorOutside = new THREE.Color('#ff69b4'); // luar (pink)

for(let i = 0; i < count; i++){

  const i3 = i * 3;

  // 👉 radius (lebih padat dekat tengah)
  const radius = Math.random() ** 1.5 * 8;

  // 👉 spiral formula (INI PENTING)
  const angle = radius * 2.5;

  // 👉 branching (buat swirl nampak)
  const branch = (i % 5) * (Math.PI * 2 / 5);

  // 👉 randomness kecil (jangan terlalu besar)
  const randomX = (Math.random() - 0.5) * 0.3;
  const randomY = (Math.random() - 0.5) * 0.3;
  const randomZ = (Math.random() - 0.5) * 0.3;

  positions[i3] = Math.cos(angle + branch) * radius + randomX;
  positions[i3+1] = randomY * 0.5;
  positions[i3+2] = Math.sin(angle + branch) * radius + randomZ;

  // 🎨 gradient color
  const mix = radius / 8;
  const color = colorInside.clone().lerp(colorOutside, mix);

  colors[i3] = color.r;
  colors[i3+1] = color.g;
  colors[i3+2] = color.b;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
  size: 0.05,
  map: texture,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  vertexColors: true
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

// 🎥 ANIMATION
function animate(){
  requestAnimationFrame(animate);

  // rotate
  galaxy.rotation.y += 0.002;

  // zoom masuk
  if(camera.position.z > 8){
    camera.position.z -= 0.05;
  }

  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
