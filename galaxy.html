<!DOCTYPE html>
<html>
<head>
  <title>Galaxy Test</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      display: block;
    }
  </style>
</head>

<body>
<canvas id="galaxy"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.getElementById('galaxy');
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
scene.add(camera);

// RENDERER
const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// PARAMETERS
const parameters = {
  count: 15000,
  size: 0.03,
  radius: 8,
  branches: 4,
  spin: 2,
  randomness: 0.5,
  randomnessPower: 3,
};

let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(parameters.count * 3);

for(let i = 0; i < parameters.count; i++){

  const i3 = i * 3;

  const radius = Math.random() * parameters.radius;
  const spinAngle = radius * parameters.spin;
  const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;

  const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius;
  const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius;
  const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius;

  positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
  positions[i3+1] = randomY * 0.5;
  positions[i3+2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  size: parameters.size,
  sizeAttenuation: true,
  color: '#ff69b4',
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// 🎥 ZOOM CONTROL
let zoomProgress = 0;

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  // rotate galaxy
  points.rotation.y += 0.002;

  // camera masuk ke tengah (ZOOM IN)
  if(zoomProgress < 1){
    zoomProgress += 0.002;
    camera.position.z = 20 - (zoomProgress * 15);
    camera.position.y = 5 - (zoomProgress * 5);
  }

  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
