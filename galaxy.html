<!DOCTYPE html>
<html>
<head>
<title>Galaxy Test</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.getElementById('c');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 30;

const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(innerWidth, innerHeight);

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* 🌌 REAL SPIRAL GALAXY */
const count = 20000;
const positions = new Float32Array(count * 3);

for(let i=0;i<count;i++){
  const i3 = i*3;

  const radius = Math.random()*20;
  const spin = radius * 2;

  const branch = (i % 5) * ((Math.PI*2)/5);

  positions[i3] = Math.cos(branch + spin) * radius;
  positions[i3+1] = (Math.random()-0.5)*2;
  positions[i3+2] = Math.sin(branch + spin) * radius;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  size: 0.1,
  color: '#ff69b4'
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

/* 🎥 AUTO ZOOM + ROTATE */
let angle = 0;

function animate(){
  requestAnimationFrame(animate);

  angle += 0.002;

  camera.position.x = Math.cos(angle)*30;
  camera.position.z = Math.sin(angle)*30;
  camera.lookAt(0,0,0);

  galaxy.rotation.y += 0.001;

  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
